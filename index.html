<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pemilihan Ketua Mangestic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #efead9;
        --paper-dark: #e3dcc4;
        --ink: #1e2a45;
        --ink-soft: #3f4e6e;
        --gold: #b8923f;
        --gold-soft: #d9c081;
        --seal: #a23b34;
        --seal-dark: #7c2c27;
        --line: #c9bfa0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--paper);
        background-image: repeating-linear-gradient(
          0deg,
          rgba(30, 42, 69, 0.02) 0px,
          rgba(30, 42, 69, 0.02) 1px,
          transparent 1px,
          transparent 3px
        );
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--ink);
        min-height: 100vh;
        padding: 32px 16px 64px;
      }
      .sheet {
        max-width: 600px;
        margin: 0 auto;
        background: var(--paper);
        border: 1px solid var(--line);
        box-shadow:
          0 1px 0 var(--line),
          0 6px 24px rgba(30, 42, 69, 0.08);
        padding: 40px 36px 36px;
        position: relative;
      }
      .sheet::before {
        content: "";
        position: absolute;
        top: 8px;
        left: 8px;
        right: 8px;
        bottom: 8px;
        border: 1px solid var(--gold-soft);
        pointer-events: none;
      }
      .eyebrow {
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--seal);
        text-align: center;
        margin: 0 0 10px;
        font-weight: 600;
      }
      h1.title {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 32px;
        line-height: 1.15;
        text-align: center;
        margin: 0 0 6px;
        color: var(--ink);
      }
      .subtitle {
        text-align: center;
        font-size: 13.5px;
        color: var(--ink-soft);
        font-style: italic;
        font-family: "Fraunces", serif;
        margin: 0 0 22px;
      }
      .rule {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold) 15%,
          var(--gold) 85%,
          transparent
        );
        margin: 0 0 28px;
      }
      .rule-thin {
        height: 1px;
        background: var(--line);
        margin: 22px 0;
      }
      .status-banner {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--paper-dark);
        border: 1px solid var(--line);
        padding: 12px 16px;
        font-size: 13px;
        color: var(--ink-soft);
        margin-bottom: 24px;
      }
      .status-banner .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--seal);
        flex-shrink: 0;
      }
      .candidate {
        display: flex;
        gap: 16px;
        padding: 18px 4px;
        border-bottom: 1px solid var(--line);
        align-items: flex-start;
      }
      .candidate:first-of-type {
        border-top: 1px solid var(--line);
      }
      .badge {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        color: var(--ink);
        background: transparent;
        border: 1.5px solid var(--gold);
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        line-height: 1;
        text-align: center;
      }
      .candidate-body {
        flex: 1;
        min-width: 0;
      }
      .candidate-name {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 19px;
        margin: 0 0 4px;
      }
      .candidate-visi {
        font-size: 13.5px;
        color: var(--ink-soft);
        margin: 0 0 12px;
        line-height: 1.5;
      }
      button {
        font-family: "IBM Plex Sans", sans-serif;
        cursor: pointer;
      }
      .btn-pilih {
        background: var(--ink);
        color: var(--paper);
        border: none;
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .btn-pilih:hover {
        background: var(--ink-soft);
      }
      .btn-pilih:active {
        transform: scale(0.98);
      }
      .btn-secondary {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink-soft);
        padding: 8px 16px;
        font-size: 13px;
      }
      .btn-secondary:hover {
        border-color: var(--ink-soft);
      }
      .footer-link {
        text-align: center;
        margin-top: 28px;
      }
      .footer-link a {
        font-size: 12px;
        color: var(--ink-soft);
        text-decoration: none;
        border-bottom: 1px dotted var(--line);
        cursor: pointer;
      }
      .footer-link a:hover {
        color: var(--ink);
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(30, 42, 69, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 16px;
      }
      .modal {
        background: var(--paper);
        border: 1px solid var(--gold-soft);
        max-width: 420px;
        width: 100%;
        padding: 28px;
        box-shadow: 0 12px 40px rgba(30, 42, 69, 0.25);
      }
      .modal h3 {
        font-family: "Fraunces", serif;
        font-size: 20px;
        margin: 0 0 10px;
      }
      .modal p {
        font-size: 14px;
        color: var(--ink-soft);
        line-height: 1.6;
        margin: 0 0 20px;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      input[type="text"],
      textarea {
        width: 100%;
        font-family: "IBM Plex Sans", sans-serif;
        font-size: 14px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        margin-bottom: 10px;
      }
      input[type="password"] {
        width: 100%;
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        margin-bottom: 10px;
      }
      label.field-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink-soft);
        display: block;
        margin-bottom: 4px;
      }
      .setup-row {
        border: 1px solid var(--line);
        padding: 14px;
        margin-bottom: 12px;
        position: relative;
        background: #fff;
      }
      .setup-row .remove {
        position: absolute;
        top: 10px;
        right: 10px;
        background: none;
        border: none;
        color: var(--seal);
        font-size: 12px;
        text-decoration: underline;
      }
      .add-candidate-btn {
        width: 100%;
        background: transparent;
        border: 1px dashed var(--line);
        padding: 12px;
        font-size: 13px;
        color: var(--ink-soft);
        margin-bottom: 18px;
      }
      .add-candidate-btn:hover {
        border-color: var(--gold);
        color: var(--ink);
      }
      .seal-stamp {
        width: 120px;
        height: 120px;
        border: 3px solid var(--seal);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 12px auto 20px;
        transform: rotate(-8deg) scale(0.5);
        opacity: 0;
        animation: stamp-in 0.5s cubic-bezier(0.2, 1.4, 0.4, 1) forwards 0.15s;
      }
      @keyframes stamp-in {
        to {
          transform: rotate(-8deg) scale(1);
          opacity: 1;
        }
      }
      .seal-stamp span {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        color: var(--seal);
        text-align: center;
        letter-spacing: 0.05em;
        line-height: 1.5;
      }
      .thanks-title {
        font-family: "Fraunces", serif;
        font-size: 22px;
        text-align: center;
        margin: 0 0 6px;
      }
      .thanks-sub {
        text-align: center;
        font-size: 13.5px;
        color: var(--ink-soft);
        margin: 0 0 4px;
      }
      .results-bar-wrap {
        margin: 14px 0;
      }
      .results-row {
        margin-bottom: 16px;
      }
      .results-label {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 5px;
      }
      .results-label .name {
        font-weight: 500;
      }
      .results-label .pct {
        font-family: "IBM Plex Mono", monospace;
        color: var(--ink-soft);
      }
      .results-track {
        height: 8px;
        background: var(--paper-dark);
        border: 1px solid var(--line);
        overflow: hidden;
      }
      .results-fill {
        height: 100%;
        background: var(--gold);
        width: 0%;
        transition: width 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .total-votes {
        text-align: center;
        font-size: 12px;
        color: var(--ink-soft);
        font-family: "IBM Plex Mono", monospace;
        margin-top: 18px;
      }
      .loading {
        text-align: center;
        padding: 60px 0;
        color: var(--ink-soft);
        font-size: 13px;
      }
      .admin-list-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
      }
      .warn-text {
        font-size: 12px;
        color: var(--seal);
        margin-top: -4px;
        margin-bottom: 14px;
      }
    </style>
  </head>

          hash |= 0;
        }
        return "dev_" + Math.abs(hash).toString(36) + "_" + str.length;
      }

      async function loadCandidates() {
        try {
          const doc = await db.collection("mangestic").doc("candidates").get();
          return doc.exists ? doc.data().list || [] : [];
        } catch (e) {
          console.error(e);
          return [];
        }
      }
      async function saveCandidates(list) {
        await db.collection("mangestic").doc("candidates").set({ list });
      }
      async function loadVotes() {
        try {
          const doc = await db.collection("mangestic").doc("votes").get();
          return doc.exists ? doc.data() : {};
        } catch (e) {
          console.error(e);
          return {};
        }
      }
      async function saveVotes(v) {
        await db.collection("mangestic").doc("votes").set(v);
      }
      async function incrementVote(candidateId) {
        await db
          .collection("mangestic")
          .doc("votes")
          .set(
            { [candidateId]: firebase.firestore.FieldValue.increment(1) },
            { merge: true },
          );
      }
      async function getVotedKey(fp) {
        try {
          const doc = await db.collection("voted").doc(fp).get();
          return doc.exists ? doc.data().candidateId : null;
        } catch (e) {
          console.error(e);
          return null;
        }
      }
      async function setVotedKey(fp, candidateId) {
        await db
          .collection("voted")
          .doc(fp)
          .set({ candidateId, ts: Date.now() });
      }

      const app = document.getElementById("app");
      const overlayRoot = document.getElementById("overlay-root");
      let fingerprint = null;
      let candidates = [];
      let votes = {};
      let votedFor = null;

      function closeOverlay() {
        overlayRoot.innerHTML = "";
      }

      function renderLoading() {
        app.innerHTML = '<div class="loading">Memuat surat suara...</div>';
      }

      function renderSetup() {
        app.innerHTML = `
    <p style="font-size:13.5px;color:var(--ink-soft);margin:0 0 18px;line-height:1.6;">
      Belum ada kandidat terdaftar. Masukkan nama-nama kandidat ketua Mangestic untuk membuka surat suara.
    </p>
    <div id="setup-rows"></div>
    <button class="add-candidate-btn" id="add-row">+ Tambah kandidat</button>
    <button class="btn-pilih" id="save-setup" style="width:100%;padding:12px;">Buka surat suara</button>
  `;
        const rows = document.getElementById("setup-rows");
        let rowCount = 0;

        function addRow(name, visi) {
          rowCount++;
          const idx = rowCount;
          const div = document.createElement("div");
          div.className = "setup-row";
          div.dataset.idx = idx;
          div.innerHTML = `
      <button class="remove" data-remove="${idx}">Hapus</button>
      <label class="field-label">Nama kandidat</label>
      <input type="text" class="cand-name" value="${name || ""}" placeholder="cth. Ahmad Fauzan">
      <label class="field-label">Visi singkat (opsional)</label>
      <input type="text" class="cand-visi" value="${visi || ""}" placeholder="cth. Mangestic yang solid dan terbuka">
    `;
          rows.appendChild(div);
        }
        addRow();
        addRow();

        rows.addEventListener("click", (e) => {
          if (e.target.dataset.remove) {
            const el = rows.querySelector(
              `[data-idx="${e.target.dataset.remove}"]`,
            );
            if (rows.children.length > 1) el.remove();
          }
        });
        document
          .getElementById("add-row")
          .addEventListener("click", () => addRow());

        document
          .getElementById("save-setup")
          .addEventListener("click", async () => {
            const rowEls = [...rows.children];
            const list = rowEls
              .map((r, i) => {
                const name = r.querySelector(".cand-name").value.trim();
                const visi = r.querySelector(".cand-visi").value.trim();
                return name
                  ? { id: "c" + (i + 1), name, visi, nomor: i + 1 }
                  : null;
              })
              .filter(Boolean);
            if (list.length < 2) {
              alert("Masukkan minimal 2 kandidat.");
              return;
            }
            await saveCandidates(list);
            candidates = list;
            votes = {};
            await saveVotes({});
            await init();
          });
      }

      function renderVoting() {
        const rows = candidates
          .map(
            (c) => `
    <div class="candidate">
      <div class="badge">${String(c.nomor).padStart(2, "0")}</div>
      <div class="candidate-body">
        <p class="candidate-name">${escapeHtml(c.name)}</p>
        ${c.visi ? `<p class="candidate-visi">${escapeHtml(c.visi)}</p>` : ""}
        <button class="btn-pilih" data-vote="${c.id}">Pilih kandidat ini</button>
      </div>
    </div>
  `,
          )
          .join("");
        app.innerHTML = `
    <div class="status-banner"><span class="dot"></span>Surat suara terbuka &mdash; pilih satu kandidat</div>
    ${rows}
  `;
        app.querySelectorAll("[data-vote]").forEach((btn) => {
          btn.addEventListener("click", () => confirmVote(btn.dataset.vote));
        });
      }

      function confirmVote(candidateId) {
        const c = candidates.find((x) => x.id === candidateId);
        overlayRoot.innerHTML = `
    <div class="overlay">
      <div class="modal">
        <h3>Konfirmasi suara</h3>
        <p>Anda akan memilih <strong>${escapeHtml(c.name)}</strong> (nomor urut ${c.nomor}). Suara tidak dapat diubah setelah dikirim.</p>
        <div class="modal-actions">
          <button class="btn-secondary" id="cancel-vote">Batal</button>
          <button class="btn-pilih" id="confirm-vote">Kirim suara</button>
        </div>
      </div>
    </div>
  `;
        document
          .getElementById("cancel-vote")
          .addEventListener("click", closeOverlay);
        document
          .getElementById("confirm-vote")
          .addEventListener("click", async () => {
            closeOverlay();
            await castVote(candidateId);
          });
      }

      async function castVote(candidateId) {
        app.innerHTML = '<div class="loading">Mencatat suara...</div>';
        const already = await getVotedKey(fingerprint);
        if (already) {
          votedFor = already;
          votes = await loadVotes();
          renderThanks(true);
          return;
        }
        await incrementVote(candidateId);
        await setVotedKey(fingerprint, candidateId);
        votes = await loadVotes();
        votedFor = candidateId;
        renderThanks(false);
      }

      function renderThanks(wasAlready) {
        const c = candidates.find((x) => x.id === votedFor);
        app.innerHTML = `
    <div class="seal-stamp"><span>SUARA<br>TERCATAT</span></div>
    <p class="thanks-title">${wasAlready ? "Suara Anda sudah tercatat" : "Terima kasih telah memilih"}</p>
    <p class="thanks-sub">${c ? "Anda memilih " + escapeHtml(c.name) + "." : ""}</p>
    <p class="thanks-sub" style="margin-bottom:22px;">Perangkat ini hanya dapat memberikan satu suara.</p>
    <div class="rule-thin"></div>
    <div id="results-mount"></div>
  `;
        renderResults(document.getElementById("results-mount"));
      }

      function renderResults(mount) {
        const total = candidates.reduce((s, c) => s + (votes[c.id] || 0), 0);
        const rows = candidates
          .slice()
          .sort((a, b) => (votes[b.id] || 0) - (votes[a.id] || 0))
          .map((c) => {
            const count = votes[c.id] || 0;
            const pct = total > 0 ? Math.round((count / total) * 100) : 0;
            return `
        <div class="results-row">
          <div class="results-label">
            <span class="name">No. ${c.nomor} &middot; ${escapeHtml(c.name)}</span>
            <span class="pct">${count} suara &middot; ${pct}%</span>
          </div>
          <div class="results-track"><div class="results-fill" style="width:${pct}%"></div></div>
        </div>
      `;
          })
          .join("");
        mount.innerHTML = `<div class="results-bar-wrap">${rows}</div><p class="total-votes">Total ${total} suara masuk</p>`;
      }

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function openAdmin() {
        overlayRoot.innerHTML = `
    <div class="overlay">
      <div class="modal">
        <h3>Kelola pemilihan</h3>
        <p>Masukkan kata sandi admin untuk melanjutkan.</p>
        <input type="password" id="admin-pass" placeholder="Kata sandi">
        <div class="modal-actions">
          <button class="btn-secondary" id="cancel-admin">Batal</button>
          <button class="btn-pilih" id="submit-admin">Masuk</button>
        </div>
      </div>
    </div>
  `;
        document
          .getElementById("cancel-admin")
          .addEventListener("click", closeOverlay);
        document
          .getElementById("submit-admin")
          .addEventListener("click", () => {
            const val = document.getElementById("admin-pass").value;
            if (val === ADMIN_PASS) {
              renderAdminPanel();
            } else {
              alert("Kata sandi salah.");
            }
          });
      }

      function renderAdminPanel() {
        const total = candidates.reduce((s, c) => s + (votes[c.id] || 0), 0);
        const list = candidates
          .map(
            (c) => `
    <div class="admin-list-item">
      <span>No. ${c.nomor} &middot; ${escapeHtml(c.name)}</span>
      <span>${votes[c.id] || 0} suara</span>
    </div>
  `,
          )
          .join("");
        overlayRoot.innerHTML = `
    <div class="overlay">
      <div class="modal" style="max-width:460px;">
        <h3>Panel admin</h3>
        <div style="margin-bottom:16px;">${list || '<p style="font-size:13px;color:var(--ink-soft);">Belum ada kandidat.</p>'}</div>
        <p style="font-size:12px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;margin-bottom:18px;">Total: ${total} suara</p>
        <div class="modal-actions" style="justify-content:space-between;">
          <button class="btn-secondary" id="reset-all">Reset kandidat &amp; suara</button>
          <div style="display:flex;gap:10px;">
            <button class="btn-secondary" id="close-admin">Tutup</button>
          </div>
        </div>
      </div>
    </div>
  `;
        document
          .getElementById("close-admin")
          .addEventListener("click", closeOverlay);
        document
          .getElementById("reset-all")
          .addEventListener("click", async () => {
            if (
              !confirm(
                "Yakin ingin menghapus semua kandidat dan suara? Tindakan ini tidak dapat dibatalkan.",
              )
            )
              return;
            await db.collection("mangestic").doc("candidates").delete();
            await db.collection("mangestic").doc("votes").delete();
            candidates = [];
            votes = {};
            votedFor = null;
            closeOverlay();
            await init();
          });
      }

      document
        .getElementById("admin-link")
        .addEventListener("click", openAdmin);

      async function init() {
        renderLoading();
        fingerprint = await getFingerprint();
        candidates = await loadCandidates();
        votes = await loadVotes();

        if (candidates.length === 0) {
          renderSetup();
          return;
        }

        const already = await getVotedKey(fingerprint);
        if (already) {
          votedFor = already;
          renderThanks(true);
          return;
        }

        renderVoting();
      }

      init();
    </script>
  </body>
</html>
